##############################################################################
#  QA AUTOMATION PIPELINE
#
#  WHEN IT RUNS:
#  ┌─ Every push to any branch          → Unit tests only (fast feedback)
#  ├─ Every Pull Request to main/develop → Unit + Integration + ZAP Scan
#  ├─ Every merge to main               → All tests + ZAP + build artifact
#  └─ Nightly at 2am UTC               → Full suite including E2E + ZAP
#
#  BUILD RULES:
#  ✅ All tests pass  → Build succeeds, PR can be merged
#  ❌ Any test fails  → Build fails, PR is BLOCKED from merging
##############################################################################

name: QA Automation Pipeline

on:
  push:
    branches: ['**']                 # fires on every single push

  pull_request:
    branches: [main, develop]        # fires when PR targets main or develop

  schedule:
    - cron: '0 2 * * *'             # nightly 2:00 AM UTC

  workflow_dispatch:                 # allow manual trigger from GitHub UI
    inputs:
      suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options: [all, unit, integration, e2e]

# ✅ TOP LEVEL PERMISSIONS — applies to all jobs
permissions:
  contents: read
  pull-requests: write
  issues: write

# ✅ DEFAULT WORKING DIRECTORY — applies to all steps in all jobs
defaults:
  run:
    working-directory: qa-cicd-practice

##############################################################################
# JOB 1 — UNIT TESTS
# Runs on: EVERY push to any branch (fastest feedback loop)
# Fails build if: any unit test fails OR coverage drops below 80%
##############################################################################
jobs:
  unit-tests:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: |
          mkdir -p reports
          node scripts/run-tests.js unit | tee reports/unit-results.txt
          exit ${PIPESTATUS[0]}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: unit-test-results
          path: qa-cicd-practice/reports/
          retention-days: 7

##############################################################################
# JOB 2 — INTEGRATION TESTS
# Runs on: Pull Requests and pushes to main/develop
# Depends on: unit-tests passing first
##############################################################################
  integration-tests:
    name: "🔗 Integration Tests"
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 15

    if: |
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main'     ||
      github.ref == 'refs/heads/develop'  ||
      github.event_name == 'schedule'     ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: |
          mkdir -p reports
          node scripts/run-tests.js integration | tee reports/integration-results.txt
          exit ${PIPESTATUS[0]}
        env:
          NODE_ENV: test

      - name: Upload integration results
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: integration-test-results
          path: qa-cicd-practice/reports/
          retention-days: 7

##############################################################################
# JOB 3 — E2E TESTS
# Runs on: merges to main and nightly schedule
# Depends on: integration-tests passing
##############################################################################
  e2e-tests:
    name: "🎭 E2E Tests"
    runs-on: ubuntu-latest
    needs: integration-tests
    timeout-minutes: 20

    if: |
      github.ref == 'refs/heads/main' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        run: |
          mkdir -p reports
          node scripts/run-tests.js e2e | tee reports/e2e-results.txt
          exit ${PIPESTATUS[0]}
        env:
          NODE_ENV: test

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: e2e-test-results
          path: qa-cicd-practice/reports/
          retention-days: 14

##############################################################################
# JOB 4 — ZAP SECURITY SCAN
# Runs on: Pull Requests and merges to main and nightly schedule
# Depends on: integration-tests passing (app must be stable before scanning)
# Reports: findings posted as GitHub Issues + HTML artifact
# Does NOT block the build (fail_action: false) — reports only
##############################################################################
  zap-security-scan:
    name: "🔐 ZAP Security Scan"
    runs-on: ubuntu-latest
    needs: integration-tests
    timeout-minutes: 20

    if: |
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main'     ||
      github.event_name == 'schedule'     ||
      github.event_name == 'workflow_dispatch'

    # ZAP needs these permissions to post findings as GitHub Issues
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # ── Start the app so ZAP has something to scan ──────────────
      - name: Start vulnerable app
        run: |
          cd app
          node vulnerable_webapp.js &
          echo "APP_PID=$!" >> $GITHUB_ENV
        working-directory: qa-cicd-practice

      # ── Wait until the app is actually responding ───────────────
      - name: Wait for app to be ready
        run: |
          echo "Waiting for app on http://localhost:3001 ..."
          for i in {1..20}; do
            if curl -s --fail http://localhost:3001 > /dev/null 2>&1; then
              echo "✅ App is up and responding!"
              break
            fi
            echo "  Attempt $i/20 — retrying in 3s..."
            sleep 3
          done
          # Final check — fail the job early if app never started
          curl -sf http://localhost:3001 > /dev/null || (echo "❌ App failed to start" && exit 1)
        working-directory: qa-cicd-practice

      # ── ZAP Baseline Scan (passive, ~3 min) ─────────────────────
      # Passive scan: crawls the app and checks responses for known
      # vulnerability patterns — no active exploitation attempted.
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3001'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'                   # -a = include ajax spider
          allow_issue_writing: true           # posts findings to GitHub Issues
          fail_action: false                  # set to true to block PRs on findings
          artifact_name: 'zap-baseline-report'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload full HTML + JSON report ───────────────────────────
      - name: Upload ZAP HTML Report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: zap-security-report
          path: |
            report_html.html
            report_json.json
            report_md.md
          retention-days: 30

      # ── Parse result for notify job ──────────────────────────────
      - name: Save ZAP result summary
        if: always()
        run: |
          mkdir -p qa-cicd-practice/reports
          if [ -f report_json.json ]; then
            HIGH=$(cat report_json.json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          alerts=d.get('site',[{}])[0].get('alerts',[])
          print(sum(1 for a in alerts if a.get('riskcode') in ['3','2']))
            " 2>/dev/null || echo "0")
            echo "ZAP_HIGH=$HIGH" >> $GITHUB_ENV
            echo "ZAP_RESULT=completed" >> $GITHUB_ENV
          else
            echo "ZAP_RESULT=no-report" >> $GITHUB_ENV
            echo "ZAP_HIGH=0" >> $GITHUB_ENV
          fi
        working-directory: .

##############################################################################
# JOB 5 — BUILD (only runs when ALL tests pass on main)
##############################################################################
  build:
    name: "🏗️ Build & Package"
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, zap-security-scan]
    timeout-minutes: 10

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Create build artifact
        run: |
          tar -czf build-${{ github.sha }}.tar.gz app/ package.json scripts/
          echo "Build artifact created: build-${{ github.sha }}.tar.gz"
          echo "Git SHA: ${{ github.sha }}"
          echo "Branch:  ${{ github.ref_name }}"
          echo "Actor:   ${{ github.actor }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: build-${{ github.run_number }}
          path: qa-cicd-practice/build-*.tar.gz
          retention-days: 30

##############################################################################
# JOB 6 — NOTIFY (always runs, summarises what happened)
# Posts result to PR as a comment — now includes ZAP security summary
##############################################################################
  notify:
    name: "📣 Post Results"
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, zap-security-scan]
    if: always() && github.event_name == 'pull_request'

    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Post PR comment with test + security summary
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const unit        = '${{ needs.unit-tests.result }}';
            const integration = '${{ needs.integration-tests.result }}';
            const e2e         = '${{ needs.e2e-tests.result }}';
            const zap         = '${{ needs.zap-security-scan.result }}';

            const icon = s =>
              s === 'success'  ? '✅' :
              s === 'skipped'  ? '⏭️' :
              s === 'failure'  ? '❌' : '⚠️';

            const allTestsPassed = [unit, integration, e2e]
              .every(s => s === 'success' || s === 'skipped');

            const zapPassed = zap === 'success' || zap === 'skipped';

            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            const body = [
              `## ${allTestsPassed ? '✅ Tests Passed' : '❌ Tests Failed'} — QA Pipeline`,
              '',
              '### 🧪 Test Results',
              '| Suite | Status |',
              '|-------|--------|',
              `| 🧪 Unit Tests        | ${icon(unit)} ${unit}               |`,
              `| 🔗 Integration Tests | ${icon(integration)} ${integration}  |`,
              `| 🎭 E2E Tests         | ${icon(e2e)} ${e2e}                 |`,
              '',
              '### 🔐 Security Scan (OWASP ZAP)',
              '| Scan | Status |',
              '|------|--------|',
              `| 🔍 ZAP Baseline Scan | ${icon(zap)} ${zap} |`,
              '',
              zapPassed
                ? '> ℹ️ ZAP report uploaded as artifact. Check **Issues** tab for any findings.'
                : '> ⚠️ ZAP scan encountered issues. Download the `zap-security-report` artifact for details.',
              '',
              '---',
              allTestsPassed
                ? '**✅ This PR is safe to merge.** All automated tests passed.'
                : '**❌ Do not merge.** Fix the failing tests before merging.',
              '',
              `[View full pipeline run →](${runUrl})`,
              `[Download ZAP Report →](${runUrl}#artifacts)`,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });