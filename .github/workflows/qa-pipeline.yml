##############################################################################
#  QA AUTOMATION PIPELINE
#
#  WHEN IT RUNS:
#  ┌─ Every push to any branch          → Unit tests only (fast feedback)
#  ├─ Every Pull Request to main/develop → Unit + Integration + ZAP Scan
#  ├─ Every merge to main               → All tests + ZAP + build artifact
#  └─ Nightly at 2am UTC               → Full suite including E2E + ZAP
#
#  BUILD RULES:
#  ✅ All tests pass  → Build succeeds, PR can be merged
#  ❌ Any test fails  → Build fails, PR is BLOCKED from merging
##############################################################################

name: QA Automation Pipeline

on:
  push:
    branches: ['**']

  pull_request:
    branches: [main, develop]

  schedule:
    - cron: '0 2 * * *'

  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options: [all, unit, integration, e2e]

permissions:
  contents: read
  pull-requests: write
  issues: write

defaults:
  run:
    working-directory: qa-cicd-practice

##############################################################################
# JOB 1 — UNIT TESTS
##############################################################################
jobs:
  unit-tests:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: |
          mkdir -p reports
          node scripts/run-tests.js unit | tee reports/unit-results.txt
          exit ${PIPESTATUS[0]}

##############################################################################
# JOB 2 — INTEGRATION TESTS (FIXED)
##############################################################################
  integration-tests:
    name: "🔗 Integration Tests"
    runs-on: ubuntu-latest
    needs: unit-tests

    # ✅ FIX: run on push + PR + others
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: |
          mkdir -p reports
          node scripts/run-tests.js integration | tee reports/integration-results.txt
          exit ${PIPESTATUS[0]}

##############################################################################
# JOB 3 — E2E TESTS (FIXED)
##############################################################################
  e2e-tests:
    name: "🎭 E2E Tests"
    runs-on: ubuntu-latest
    needs: integration-tests

    # ✅ FIX: allow push execution
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: |
          mkdir -p reports
          node scripts/run-tests.js e2e | tee reports/e2e-results.txt
          exit ${PIPESTATUS[0]}

##############################################################################
# JOB 4 — ZAP SECURITY SCAN (FIXED)
##############################################################################
  zap-security-scan:
    name: "🔐 ZAP Security Scan"
    runs-on: ubuntu-latest
    needs: integration-tests

    # ✅ FIX: run on push + PR + all triggers
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Start app
        run: node app/vulnerable_webapp.js &

      - name: Wait for app
        run: |
          for i in {1..20}; do
            curl -s http://localhost:3001 && break
            sleep 3
          done

      - name: Run ZAP Scan
        run: |
          docker pull ghcr.io/zaproxy/zaproxy:stable
          docker run --rm --network host \
            -v $(pwd)/qa-cicd-practice/reports:/zap/wrk \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
            -t http://localhost:3001 \
            -r zap_report.html

##############################################################################
# JOB 5 — BUILD
##############################################################################
  build:
    name: "🏗️ Build & Package"
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, zap-security-scan]

    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci --omit=dev

      - run: |
          tar -czf build.tar.gz app/ package.json scripts/

##############################################################################
# JOB 6 — NOTIFY
##############################################################################
  notify:
    name: "📣 Post Results"
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, zap-security-scan]

    if: always() && github.event_name == 'pull_request'

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const results = `
            Unit: ${{ needs.unit-tests.result }}
            Integration: ${{ needs.integration-tests.result }}
            E2E: ${{ needs.e2e-tests.result }}
            ZAP: ${{ needs.zap-security-scan.result }}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: results
            });