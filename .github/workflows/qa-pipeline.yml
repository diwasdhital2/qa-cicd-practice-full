##############################################################################
#  QA AUTOMATION PIPELINE
#
#  WHEN IT RUNS:
#  ┌─ Every push to any branch          → Unit tests only (fast feedback)
#  ├─ Every Pull Request to main/develop → Unit + Integration + ZAP Scan
#  ├─ Every merge to main               → All tests + ZAP + build artifact
#  └─ Nightly at 2am UTC               → Full suite including E2E + ZAP
#
#  BUILD RULES:
#  ✅ All tests pass  → Build succeeds, PR can be merged
#  ❌ Any test fails  → Build fails, PR is BLOCKED from merging
##############################################################################

name: QA Automation Pipeline

on:
  push:
    branches:
      - main
      - rojeshsecurity
      - '**'
  pull_request:
    branches:
      - main

jobs:
  qa-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: qa-cicd-practice

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      # -----------------------
      # START APPLICATION
      # -----------------------
      - name: Start app
        run: |
          node vulnerable_server.js &
          sleep 10

      - name: Verify app is running
        run: curl -v http://localhost:3001

      # -----------------------
      # UNIT TESTS
      # -----------------------
      - name: Run Unit Tests
        run: |
          mkdir -p reports
          node scripts/run-tests.js unit | tee reports/unit.txt
          exit ${PIPESTATUS[0]}

      # -----------------------
      # INTEGRATION TESTS
      # -----------------------
      - name: Run Integration Tests
        run: |
          node scripts/run-tests.js integration | tee reports/integration.txt
          exit ${PIPESTATUS[0]}

      # -----------------------
      # E2E TESTS
      # -----------------------
      - name: Run E2E Tests
        run: |
          node scripts/run-tests.js e2e | tee reports/e2e.txt
          exit ${PIPESTATUS[0]}

      # -----------------------
      # ZAP SECURITY SCAN
      # -----------------------
      - name: Create reports folder
        run: mkdir -p reports

      - name: Pull ZAP Docker image
        run: docker pull ghcr.io/zaproxy/zaproxy:stable

      - name: Run ZAP Scan
        run: |
          docker run --rm \
            --network host \
            -v $(pwd)/reports:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
              -t http://localhost:3001 \
              -r zap_report.html \
              -J zap_report.json \
              -I \
              -T 5 \
              -l WARN

      # -----------------------
      # DEBUG REPORTS
      # -----------------------
      - name: Check reports
        run: |
          echo "Current directory:"
          pwd
          echo "Files:"
          ls -la reports

      # -----------------------
      # UPLOAD ARTIFACTS
      # -----------------------
      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-report
          path: |
            qa-cicd-practice/reports/zap_report.html
            qa-cicd-practice/reports/zap_report.json