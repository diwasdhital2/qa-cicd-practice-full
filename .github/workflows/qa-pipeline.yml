##############################################################################
#  QA AUTOMATION PIPELINE
#
#  WHEN IT RUNS:
#  ┌─ Every push to any branch          → Unit tests only (fast feedback)
#  ├─ Every Pull Request to main/develop → Unit + Integration tests
#  ├─ Every merge to main               → All tests + build artifact
#  └─ Nightly at 2am UTC               → Full suite including E2E
#
#  BUILD RULES:
#  ✅ All tests pass  → Build succeeds, PR can be merged
#  ❌ Any test fails  → Build fails, PR is BLOCKED from merging
##############################################################################

name: QA Automation Pipeline

on:
  push:
    branches: ['**']                 # fires on every single push

  pull_request:
    branches: [main, develop]        # fires when PR targets main or develop

  schedule:
    - cron: '0 2 * * *'             # nightly 2:00 AM UTC

  workflow_dispatch:                 # allow manual trigger from GitHub UI
    inputs:
      suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options: [all, unit, integration, e2e]

# ✅ TOP LEVEL PERMISSIONS — applies to all jobs
permissions:
  contents: read
  pull-requests: write
  issues: write

##############################################################################
# JOB 1 — UNIT TESTS
# Runs on: EVERY push to any branch (fastest feedback loop)
# Fails build if: any unit test fails OR coverage drops below 80%
##############################################################################
jobs:
  unit-tests:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}    # ✅ fix git auth error

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: qa-cicd-practice

      - name: Run unit tests
        run: |
          mkdir -p reports
          node scripts/run-tests.js unit | tee reports/unit-results.txt
        working-directory: qa-cicd-practice    # ✅ saves output to file
        # Non-zero exit code automatically fails the job and blocks the PR

      - name: Upload test results
        if: always()               # upload even on failure so you can debug
        uses: actions/upload-artifact@v4.6.2
        with:
          name: unit-test-results
          path: qa-cicd-practice/reports/      # ✅ correct path
          retention-days: 7

##############################################################################
# JOB 2 — INTEGRATION TESTS
# Runs on: Pull Requests and pushes to main/develop
# Depends on: unit-tests passing first
# Fails build if: any integration test fails
##############################################################################
  integration-tests:
    name: "🔗 Integration Tests"
    runs-on: ubuntu-latest
    needs: unit-tests              # only runs if unit tests passed
    timeout-minutes: 15

    # Skip on feature branch pushes — only run on PRs and main/develop
    if: |
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main'     ||
      github.ref == 'refs/heads/develop'  ||
      github.event_name == 'schedule'     ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}    # ✅ fix git auth error

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: qa-cicd-practice    # ✅ fixed

      - name: Run integration tests
        run: |
          mkdir -p reports
          node scripts/run-tests.js integration | tee reports/integration-results.txt
        working-directory: qa-cicd-practice    # ✅ saves output to file
        env:
          NODE_ENV: test

      - name: Upload integration results
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: integration-test-results
          path: qa-cicd-practice/reports/      # ✅ correct path
          retention-days: 7

##############################################################################
# JOB 3 — E2E TESTS
# Runs on: merges to main and nightly schedule
# Depends on: integration-tests passing
# Fails build if: any E2E test or smoke test fails
##############################################################################
  e2e-tests:
    name: "🎭 E2E Tests"
    runs-on: ubuntu-latest
    needs: integration-tests
    timeout-minutes: 20

    if: |
      github.ref == 'refs/heads/main' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}    # ✅ fix git auth error

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: qa-cicd-practice    # ✅ fixed

      - name: Run E2E tests
        run: |
          mkdir -p reports
          node scripts/run-tests.js e2e | tee reports/e2e-results.txt
        working-directory: qa-cicd-practice    # ✅ saves output to file
        env:
          NODE_ENV: test

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: e2e-test-results
          path: qa-cicd-practice/reports/      # ✅ correct path
          retention-days: 14

##############################################################################
# JOB 4 — BUILD (only runs when ALL tests pass on main)
# This is the "green build" — what gets deployed
##############################################################################
  build:
    name: "🏗️ Build & Package"
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests]
    timeout-minutes: 10

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}    # ✅ fix git auth error

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install production dependencies
        run: npm ci --omit=dev
        working-directory: qa-cicd-practice    # ✅ fixed

      - name: Create build artifact
        run: |
          tar -czf build-${{ github.sha }}.tar.gz app/ package.json scripts/
          echo "Build artifact created: build-${{ github.sha }}.tar.gz"