##############################################################################
#  QA AUTOMATION PIPELINE
#
#  WHEN IT RUNS:
#  ┌─ Every push to any branch          → Unit tests only (fast feedback)
#  ├─ Every Pull Request to main/develop → Unit + Integration + ZAP Scan
#  ├─ Every merge to main               → All tests + ZAP + build artifact
#  └─ Nightly at 2am UTC               → Full suite including E2E + ZAP
#
#  BUILD RULES:
#  ✅ All tests pass  → Build succeeds, PR can be merged
#  ❌ Any test fails  → Build fails, PR is BLOCKED from merging
##############################################################################

name: QA Automation Pipeline

on:
  push:
    branches: ['**']

  pull_request:
    branches: [main, develop]

  schedule:
    - cron: '0 2 * * *'

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

defaults:
  run:
    working-directory: qa-cicd-practice

##############################################################################
# JOB 1 — UNIT TESTS
##############################################################################
jobs:
  unit-tests:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: |
          mkdir -p reports
          node scripts/run-tests.js unit | tee reports/unit-results.txt
          exit ${PIPESTATUS[0]}

##############################################################################
# JOB 2 — INTEGRATION TESTS
##############################################################################
  integration-tests:
    name: "🔗 Integration Tests"
    runs-on: ubuntu-latest
    needs: unit-tests

    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: |
          mkdir -p reports
          node scripts/run-tests.js integration | tee reports/integration-results.txt
          exit ${PIPESTATUS[0]}

##############################################################################
# JOB 3 — E2E TESTS
##############################################################################
  e2e-tests:
    name: "🎭 E2E Tests"
    runs-on: ubuntu-latest
    needs: integration-tests

    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: |
          mkdir -p reports
          node scripts/run-tests.js e2e | tee reports/e2e-results.txt
          exit ${PIPESTATUS[0]}

##############################################################################
# JOB 4 — ZAP SECURITY SCAN (FIXED)
##############################################################################
  zap-security-scan:
    name: "🔐 ZAP Security Scan"
    runs-on: ubuntu-latest
    needs: integration-tests

    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      # 🔹 Debug working directory
      - name: Debug path
        run: |
          echo "PWD: $(pwd)"
          ls -la

      # 🔹 Start app
      - name: Start app
        run: node app/vulnerable_webapp.js &

      # 🔹 Wait for app
      - name: Wait for app
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:3001 > /dev/null; then
              echo "App is up"
              break
            fi
            sleep 3
          done

      # 🔹 Create reports folder
      - name: Create reports directory
        run: mkdir -p reports

      # 🔹 Pull ZAP
      - name: Pull ZAP Docker image
        run: docker pull ghcr.io/zaproxy/zaproxy:stable

      # 🔹 Run ZAP Scan (FIXED PATH)
      - name: Run ZAP Full Scan
        run: |
          docker run --rm \
            --network host \
            -v $(pwd)/reports:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
              -t http://localhost:3001 \
              -r zap_report.html \
              -J zap_report.json \
              -a \
              -T 5 \
              -l WARN

      # 🔹 Verify reports
      - name: Verify reports
        run: |
          echo "Checking reports folder"
          ls -la reports

      # 🔹 Upload reports
      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-report
          path: |
            reports/zap_report.html
            reports/zap_report.json
          retention-days: 30

##############################################################################
# JOB 5 — BUILD
##############################################################################
  build:
    name: "🏗️ Build & Package"
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, zap-security-scan]

    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci --omit=dev

      - run: |
          tar -czf build.tar.gz app/ package.json scripts/

##############################################################################
# JOB 6 — NOTIFY
##############################################################################
  notify:
    name: "📣 Post Results"
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, zap-security-scan]

    if: always() && github.event_name == 'pull_request'

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = `
            ## QA Pipeline Results

            Unit: ${{ needs.unit-tests.result }}
            Integration: ${{ needs.integration-tests.result }}
            E2E: ${{ needs.e2e-tests.result }}
            ZAP: ${{ needs.zap-security-scan.result }}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });